name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      version: ${{ steps.set-version-number.outputs.version }}
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5

      with:
        dotnet-version: 10.x
        source-url: https://nuget.pkg.github.com/AndrewMcLachlan/index.json
      env:
        NUGET_AUTH_TOKEN: ${{secrets.CROSS_REPO_PACKAGE_TOKEN}}
    - name: Set version number
      id: set-version-number
      uses: andrewmclachlan/actions/set-version-number@v4
      with:
        project: 'src/AmCom.Web'
        version-property-name: 'Version'
    - name: Restore dependencies
      run: dotnet restore AmCom.slnx
    - name: Publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.CROSS_REPO_PACKAGE_TOKEN }}
      run: dotnet publish src/AmCom.Web/AmCom.Web.csproj --output ${{ github.workspace }}/publish --configuration Release --p:Version=${{ steps.set-version-number.outputs.version }} --p:FileVersion=${{ steps.set-version-number.outputs.version }} --no-restore
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: publish
        path: ${{ github.workspace }}/publish
    - name: Build Docker image (validation only)
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./src/AmCom.Web/Dockerfile
        push: false
        tags: |
          ghcr.io/andrewmclachlan/amcom:${{steps.set-version-number.outputs.version}}
          ghcr.io/andrewmclachlan/amcom:latest

  docker-push:
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name != 'pull_request' && github.event_name != 'pull_request_target' && github.ref == 'refs/heads/main')
    permissions:
      packages: write
      contents: read
    steps:
    - uses: actions/checkout@v6
    - name: Download publish artifact
      uses: actions/download-artifact@v8
      with:
        name: publish
        path: ${{ github.workspace }}/publish
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./src/AmCom.Web/Dockerfile
        push: true
        tags: |
          ghcr.io/andrewmclachlan/amcom:${{needs.build.outputs.version}}
          ghcr.io/andrewmclachlan/amcom:latest
        cache-from: type=registry,ref=ghcr.io/andrewmclachlan/amcom:latest
        cache-to: type=inline

  staging:
    concurrency:
      group: amcom-deploy-group
      cancel-in-progress: true
    needs: [build, docker-push]
    if: (github.event_name != 'pull_request' && github.event_name != 'pull_request_target' && github.ref == 'refs/heads/main')
    uses: AndrewMcLachlan/actions/.github/workflows/deploy-azure.yml@v4
    with:
      environment: Staging
      artifact-name: publish
      app-name: andrewmclachlan
      resource-group: AndrewMcLachlan
      slot-name: staging
      container-image: ghcr.io/andrewmclachlan/amcom:${{needs.build.outputs.version}}
      container-name: main
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  production:
    concurrency:
      group: amcom-deploy-group
      cancel-in-progress: true
    needs: staging
    if: (github.event_name != 'pull_request' && github.event_name != 'pull_request_target' && github.ref == 'refs/heads/main')
    uses: AndrewMcLachlan/actions/.github/workflows/azure-appservice-swap-slot.yml@v4
    with:
      environment: Production
      app-name: andrewmclachlan
      slot-name: staging
      resource-group: AndrewMcLachlan
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  post-production:
    concurrency:
      group: amcom-deploy-group
      cancel-in-progress: true
    needs: [build, production]
    if: (github.event_name != 'pull_request' && github.event_name != 'pull_request_target' && github.ref == 'refs/heads/main')
    uses: AndrewMcLachlan/actions/.github/workflows/deploy-azure.yml@v4
    with:
      environment: Post-Production
      artifact-name: publish
      app-name: andrewmclachlan
      resource-group: AndrewMcLachlan
      slot-name: staging
      container-image: ghcr.io/andrewmclachlan/amcom:${{needs.build.outputs.version}}
      container-name: main
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
